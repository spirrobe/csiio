repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']

# Local hook to enforce CHANGELOG update
  - repo: local
    hooks:
      - id: changelog-check
        name: Ensure CHANGELOG.md is updated
        entry: bash scripts/check_changelog_staged.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
