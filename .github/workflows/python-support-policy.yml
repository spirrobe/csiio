name: Python Support Policy

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Run Python support policy checker
        run: python scripts/check_python_support_policy.py
