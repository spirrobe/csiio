name: Changelog Check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  changelog-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure changelog updated when code changes
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            echo "No comparable base SHA available; skipping changelog check."
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "${BASE_SHA}"..."${{ github.sha }}")
          echo "Changed files:"
          echo "${CHANGED_FILES}"

          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "No changed files."
            exit 0
          fi

          CODE_CHANGES=$(echo "${CHANGED_FILES}" | grep -E '^(csiio/|tests/|pyproject.toml|MANIFEST.in|\.github/workflows/)' || true)
          CHANGELOG_CHANGED=$(echo "${CHANGED_FILES}" | grep -E '^CHANGELOG\.md$' || true)

          if [[ -n "${CODE_CHANGES}" && -z "${CHANGELOG_CHANGED}" ]]; then
            echo "Code/config changes detected without CHANGELOG.md update."
            echo "Please add an entry under [Unreleased] in CHANGELOG.md."
            exit 1
          fi

          echo "Changelog check passed."
